# Experiment 01: Baseline RAG configuration
# Fixed chunking, MiniLM embeddings, dense retrieval, no reranker.

experiment_name: baseline_fixed_512

ingestion:
  chunker: fixed
  chunk_size: 512
  chunk_overlap: 50
  embedding_model: all-MiniLM-L6-v2

store:
  persist_directory: data/chroma

retrieval:
  top_k: 5
  reranker: null

generation:
  llm: ollama/llama3.2
  temperature: 0.1
  prompt_template: default_qa

data:
  documents:
    - data/raw
  eval_set: data/eval_sets/sample_questions.yaml
