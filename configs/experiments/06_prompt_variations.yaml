# Experiment 06: Prompt template variations
# Tests chain-of-thought prompting against baseline default_qa.

experiment_name: prompt_variations

ingestion:
  chunker: fixed
  chunk_size: 512
  chunk_overlap: 50
  embedding_model: all-MiniLM-L6-v2

retrieval:
  top_k: 5
  reranker: null

store:
  persist_directory: data/chroma

generation:
  llm: ollama/llama3.2
  temperature: 0.1
  prompt_template: chain_of_thought

data:
  documents:
    - data/raw
  eval_set: data/eval_sets/sample_questions.yaml
