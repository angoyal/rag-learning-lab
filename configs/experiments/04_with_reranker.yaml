# Experiment 04: With cross-encoder reranker
# Adds a reranking step after dense retrieval to improve precision.

experiment_name: with_reranker

ingestion:
  chunker: fixed
  chunk_size: 512
  chunk_overlap: 50
  embedding_model: all-MiniLM-L6-v2

retrieval:
  top_k: 5
  reranker: cross-encoder/ms-marco-MiniLM-L-2-v2

generation:
  llm: ollama/llama3.2
  temperature: 0.1
  prompt_template: structured
