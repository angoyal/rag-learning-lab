# Experiment: arXiv auto-scaling papers
# Semantic chunking on auto-scaling research papers.

experiment_name: arxiv_auto_scaling

ingestion:
  chunker: semantic
  chunk_size: 512
  chunk_overlap: 50
  embedding_model: all-MiniLM-L6-v2

store:
  persist_directory: data/chroma

retrieval:
  top_k: 5
  reranker: null

generation:
  llm: ollama/llama3.2
  temperature: 0.0
  prompt_template: default_qa

data:
  documents:
    - data/arxivAutoScalingPapers
  eval_set: data/eval_sets/sample_questions.yaml
