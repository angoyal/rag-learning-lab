# Experiment 08: Scale test
# Larger chunks, more retrieval, sentence chunking.

experiment_name: scale_test

ingestion:
  chunker: sentence
  chunk_size: 1024
  chunk_overlap: 100
  embedding_model: all-MiniLM-L6-v2

retrieval:
  top_k: 10
  reranker: cross-encoder/ms-marco-MiniLM-L-2-v2

store:
  persist_directory: data/chroma

generation:
  llm: ollama/llama3.2
  temperature: 0.0
  prompt_template: structured

data:
  documents:
    - data/raw
  eval_set: data/eval_sets/sample_questions.yaml
